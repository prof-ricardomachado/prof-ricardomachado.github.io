<body class="pretext ignore-math" id="pretext-SA"><div style="width:600px; height:480px; display: block; box-sizing: border-box; -moz-box-sizing: border-box; -webkit-box-sizing: border-box;"><pre class="ptx-sagecell sage-interact"><script type="text/x-sage">@interact
def _(l=input_box(6, width=25,  label="m:"), c=input_box(9, width=25,  label="n:"),auto_update=False ):
    
    
    def visualizar_diagonal_retangulo_completo(m, n):
    # Cálculo exato
        num_quadrados = m + n - gcd(m,n)
        slope = QQ(n) / QQ(m)
    
        # Lista para armazenar as formas (mais rápido que somar p += ...)
        elementos = []
    
        # 1. Desenhar TODOS os quadrados do retângulo (Grid completo)
        for i in range(m):
            for j in range(n):
                # Lógica de interseção: a diagonal entra no interior do quadrado?
                y_inicio = i * slope
                y_fim = (i + 1) * slope
            
                # Condição matemática para passar por dentro do quadrado (i, j)
                if j + 1 > y_inicio  and y_fim > j:
                    cor = '#FF8C00' # Laranja escuro
                else:
                    cor = 'white'
                
                elementos.append(polygon([(i, j), (i+1, j), (i+1, j+1), (i, j+1)], 
                                     color=cor, edgecolor='gray', thickness=0.5))
    
        # 2. Desenhar a diagonal principal
        elementos.append(line([(0, 0), (m, n)], color='red', thickness=1, figsize=5))
    
        # Criar o gráfico final
        grafico = sum(elementos)
        grafico.set_aspect_ratio(1)
    
        print(f"Dimensões: {n}x{m}")
        print(f"Quadrados que a diagonal atravessa: {num_quadrados}")
    
        return grafico.show(frame=False, axes=False)

    # Teste com dimensões menores para ver o grid completo
    visualizar_diagonal_retangulo_completo(c,l)
