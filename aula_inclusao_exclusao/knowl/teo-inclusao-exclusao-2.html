<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Teorema</span><span class="space"> </span><span class="codenumber">1.2</span><span class="period">.</span>
</h4>
<div class="para logical">
<div class="para">Sejam  <span class="process-math">\(A\)</span>  e  <span class="process-math">\(B\)</span>  conjuntos finitos, então</div>
<div class="displaymath process-math">
\begin{equation*}
\#(A\cup B) = \#A + \# B - \#(A\cap B). 
\end{equation*}
</div>
</div> <figure class="figure figure-like"><div class="image-box" style="width: 80%; margin-left: 10%; margin-right: 10%;"><img src="images/inclusaoexclusao2novo.svg" role="img" class="contained"></div>
<figcaption><span class="type">Figura</span><span class="space"> </span><span class="codenumber">1.3<span class="period">.</span></span><span class="space"> </span>Diagrama de Venn para <span class="process-math">\((A\cup B)\text{.}\)</span></figcaption></figure> <div class="para">Ou seja, a cardinalidade de <span class="process-math">\(A\cup B\)</span> é igual a cardinalidade de <span class="process-math">\(A\)</span> mais a cardinalidade de <span class="process-math">\(B\)</span> menos a cardinalidade de <span class="process-math">\(A\cap B\text{.}\)</span>
