<div class="para logical">
<div class="para">O número <span class="process-math">\(S_n\)</span> de permutações do conjunto <span class="process-math">\(\{1, 2, \dots, n\}\)</span> sem uma sucessão é igual a</div>
<div class="displaymath process-math">
\begin{equation*}
S_n = \sum_{k=0}^{n-1} (-1)^k \binom{n-1}{k} (n-k)!
\end{equation*}
