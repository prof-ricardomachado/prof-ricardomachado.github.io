<h5 class="heading"><span class="type">Parágrafo</span></h5>
<div class="para">Note que há três repetições. Opa! <span class="process-math">\(mdc(6, 9) = 3\)</span> e <span class="process-math">\((6, 9) = 3 \cdot (2, 3)\text{.}\)</span> O que acontece é que se <span class="process-math">\(mdc(a, b) = d\text{,}\)</span> ocorrem <span class="process-math">\(d\)</span> blocos de repetições. Logo, devemos subtrair <span class="process-math">\(mdc(a, b)\text{.}\)</span> A resposta é <span class="process-math">\(a + b - mdc(a, b)\text{.}\)</span>
</div>
