<h5 class="heading"><span class="type">Parágrafo</span></h5>
<div class="para">A formiga deve ir para a direita exatamente 5 vezes. Ao escolhermos esses movimentos, o resto do caminho estará bem definido. Como podemos escolher cada um destes cinco movimentos de seis maneiras, o total de caminhos será <span class="process-math">\(6 \cdot 6 \cdot 6 \cdot 6 \cdot 6 = 6^5\text{.}\)</span>
