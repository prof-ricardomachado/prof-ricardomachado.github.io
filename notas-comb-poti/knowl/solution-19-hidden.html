<body class="ignore-math"><div class="solution solution-like"><div class="para">A palavra vetor possui <span class="process-math">\(5! = 120\)</span> anagramas. Usando a mesma ideia do problema 19 (separar em blocos), podemos achar que a quantidade destes anagramas com vogais juntas é <span class="process-math">\(2 \times 4! = 48\text{.}\)</span> Logo, temos <span class="process-math">\(120 - 48 = 72\)</span> anagramas com as vogais separadas.</div></div></body>
