</h5>Para que um divisor seja quadrado perfeito, <span class="process-math">\(a\text{,}\)</span> <span class="process-math">\(b\)</span> e <span class="process-math">\(c\)</span> devem ser pares. Logo, só poderão assumir os valores <span class="process-math">\(\{0,2,4\}\)</span> para <span class="process-math">\(a\)</span> e <span class="process-math">\(\{0,2\}\)</span> para <span class="process-math">\(b\)</span> e <span class="process-math">\(c\text{.}\)</span> O número de divisores satisfazendo isso é <span class="process-math">\(3 \cdot 2 \cdot 2 = 12\text{.}\)</span></article><span class="incontext"><a href="section-1.html#li-12" class="internal">em contexto</a></span>
