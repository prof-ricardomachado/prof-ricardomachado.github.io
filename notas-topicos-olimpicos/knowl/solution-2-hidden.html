<body class="ignore-math"><div class="solution solution-like"><div class="para">Observe que a soma dos números escritos em uma mesma folha sempre é ímpar. Dessa forma, se Nicolas arrancou 25 folhas, a soma de todos os números será ímpar. Pois é a soma de uma quantidade ímpar de números ímpares. Logo, esta soma não pode ser 1990.</div></div></body>
