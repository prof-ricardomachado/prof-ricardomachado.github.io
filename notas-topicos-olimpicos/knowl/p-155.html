<h5 class="heading"><span class="type">Parágrafo</span></h5>
<div class="para logical">
<div class="para">Temos 10 somas e 9 restos possíveis. Pelo PCP, pelo menos dois restos são iguais, ou seja, existem <span class="process-math">\(i\)</span> e <span class="process-math">\(j\text{,}\)</span> tais que <span class="process-math">\(S_i\equiv S_j \mod 10\text{.}\)</span> Se <span class="process-math">\(i&gt;j\text{,}\)</span>
</div>
<div class="displaymath process-math">
\begin{equation*}
S_i-S_j = a_{j+1}+a_{j+2}+\cdots+ a_i \equiv 0 \mod 10.
\end{equation*}
</div>
</div>
