<article class="assemblage assemblage-like"><h4 class="heading"><span class="title">Teorema do Anulamento (Proposição 3.3.6).</span></h4>
<div class="para logical">
<div class="para">Se <span class="process-math">\(\lim_{(x,y) \to (x_0, y_0)} f(x,y) = 0\)</span> e <span class="process-math">\(g(x,y)\)</span> é uma função limitada numa vizinhança de <span class="process-math">\((x_0, y_0)\text{,}\)</span> então:</div>
<div class="displaymath process-math">
\begin{equation*}
\lim_{(x,y) \to (x_0, y_0)} f(x,y) \cdot g(x,y) = 0\text{.}
\end{equation*}
