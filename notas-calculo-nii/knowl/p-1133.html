<h4 class="heading"><span class="type">Parágrafo</span></h4>
<div class="para">Seja <span class="process-math">\(f: A \subset \mathbb{R}^2 \to \mathbb{R}\)</span> uma função contínua no conjunto fechado e limitado (compacto) <span class="process-math">\(A\text{.}\)</span> Então existem pontos <span class="process-math">\(P_1, P_2 \in A\)</span> tais que <span class="process-math">\(f(P_1) \le f(P) \le f(P_2)\)</span> para qualquer ponto <span class="process-math">\(P \in A\text{.}\)</span>
</div>
