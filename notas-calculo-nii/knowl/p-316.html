<div class="para">A força total é a integral da carga distribuída ao longo da viga:</div>
<div class="displaymath process-math">
\begin{equation*}
F = \int_{0}^{5} (10 + 2x) \, dx = \left. \left[ 10x + x^2 \right] \right|_0^5
\end{equation*}

<div class="displaymath process-math">
\begin{equation*}
F = (10(5) + 5^2) - 0 = 50 + 25 = 75 \text{ Newtons}\text{.}
\end{equation*}
