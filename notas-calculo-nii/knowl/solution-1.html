<div class="para logical">
<div class="para">Fazemos <span class="process-math">\(u = 1+x^2\text{.}\)</span> Então, <span class="process-math">\(du = 2x dx\text{.}\)</span> Temos:</div>
<div class="displaymath process-math">
\begin{equation*}
\int \frac{2x}{1+x^2} dx = \int \frac{du}{u} = \ln|u| + c = \ln(1+x^2) + c\text{.}
\end{equation*}
