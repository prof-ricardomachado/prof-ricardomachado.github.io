<h4 class="heading"><span class="type">Parágrafo</span></h4>
<div class="para">As derivadas <span class="process-math">\(\frac{\partial^2 f}{\partial x \partial y}\)</span> e <span class="process-math">\(\frac{\partial^2 f}{\partial y \partial x}\)</span> são chamadas de derivadas parciais mistas. Na maioria das funções práticas, essas derivadas são iguais. Essa igualdade é garantida pelo Teorema de Schwartz.</div>
