<div class="para">Para funções de três variáveis <span class="process-math">\(w = f(x,y,z)\text{,}\)</span> o vetor gradiente é estendido de forma análoga:</div>
<div class="displaymath process-math">
\begin{equation*}
\nabla w = \left( \frac{\partial f}{\partial x}, \frac{\partial f}{\partial y}, \frac{\partial f}{\partial z} \right)\text{.}
\end{equation*}
