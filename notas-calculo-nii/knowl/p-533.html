<div class="para">Passo 3: Aplicar a regra da composição. A composição <span class="process-math">\((f \circ g)\)</span> será contínua nos pontos onde <span class="process-math">\(g(x,y)\)</span> fornece valores para os quais <span class="process-math">\(f\)</span> é contínua. Portanto, precisamos que:</div>
<div class="displaymath process-math">
\begin{equation*}
g(x,y) &gt; 0 \implies y - x &gt; 0 \implies y &gt; x
\end{equation*}
