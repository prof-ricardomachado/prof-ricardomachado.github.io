<div class="para">As derivadas parciais são <span class="process-math">\(\frac{\partial f}{\partial x} = y^2 \cos(xy^2)\)</span> e <span class="process-math">\(\frac{\partial f}{\partial y} = 2xy \cos(xy^2)\text{.}\)</span> Como essas derivadas são contínuas em <span class="process-math">\(\mathbb{R}^2\text{,}\)</span> a função <span class="process-math">\(f\)</span> é diferenciável em todo o <span class="process-math">\(\mathbb{R}^2\text{.}\)</span>
