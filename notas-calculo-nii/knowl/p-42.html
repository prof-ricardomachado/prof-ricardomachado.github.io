<div class="para">Como, por hipótese, <span class="process-math">\(F'(x) = f(x)\text{,}\)</span> podemos substituir <span class="process-math">\(F'\)</span> por <span class="process-math">\(f\)</span> na expressão anterior, obtendo:</div>
