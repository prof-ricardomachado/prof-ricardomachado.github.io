<div class="para logical">
<div class="para">Se fizermos <span class="process-math">\(u = \operatorname{sen} x\text{,}\)</span> então <span class="process-math">\(du = \cos x dx\text{.}\)</span> Assim:</div>
<div class="displaymath process-math">
\begin{equation*}
\int \operatorname{sen}^2 x \cos x dx = \int u^2 du = \frac{u^3}{3} + c = \frac{\operatorname{sen}^3 x}{3} + c\text{.}
\end{equation*}
