<div class="para">Uma primitiva de <span class="process-math">\(f(x) = x^2\)</span> é <span class="process-math">\(G(x) = \frac{x^3}{3}\text{.}\)</span> Assim:</div>
<div class="displaymath process-math">
\begin{equation*}
\int_1^2 x^2 \, dx = \left. \frac{x^3}{3} \right|_1^2 = \frac{2^3}{3} - \frac{1^3}{3} = \frac{7}{3}\text{.}
\end{equation*}
