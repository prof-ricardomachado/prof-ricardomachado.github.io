\begin{equation*}
Q = \int_{0}^{\pi} \operatorname{sen}(t) \, dt = \left. \left[ -\cos(t) \right] \right|_0^{\pi} = -\cos(\pi) - (-\cos(0)) = 1 + 1 = 2 \text{ C}\text{.}
