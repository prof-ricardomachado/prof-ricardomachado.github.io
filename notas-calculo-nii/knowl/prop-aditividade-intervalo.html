<article class="proposition theorem-like"><h4 class="heading">
<span class="type">Proposição</span><span class="space"> </span><span class="codenumber">1.5.3</span><span class="period">.</span><span class="space"> </span><span class="title">Aditividade de Intervalo.</span>
</h4>
<div class="para logical">
<div class="para">Se <span class="process-math">\(f\)</span> é integrável em um intervalo que contém <span class="process-math">\(a, b\)</span> e <span class="process-math">\(c\text{,}\)</span> então:</div>
<div class="displaymath process-math">
\begin{equation*}
\int_{a}^{b} f(x) \, dx = \int_{a}^{c} f(x) \, dx + \int_{c}^{b} f(x) \, dx\text{.}
\end{equation*}
</div>
