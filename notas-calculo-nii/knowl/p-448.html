<div class="para">A função <span class="process-math">\(f(u) = \sin(u)\)</span> é contínua em toda a reta real, em particular em <span class="process-math">\(u = \pi/2\text{.}\)</span> Aplicando a propriedade:</div>

\begin{equation*}
\sin\left( \lim_{(x,y) \to (\pi/2, 0)} (x + y) \right) = \sin\left(\frac{\pi}{2}\right) = 1
\end{equation*}
