<h4 class="heading"><span class="type">Parágrafo</span></h4>
<div class="para">O Teorema de Schwartz pode ser generalizado para derivadas de ordem mais alta (3ª ordem, 4ª ordem, etc.). Se todas as derivadas em questão forem contínuas, a ordem da derivação não altera o resultado final (exemplo: <span class="process-math">\(f_{xxy} = f_{xyx} = f_{yxx}\)</span>).</div>
