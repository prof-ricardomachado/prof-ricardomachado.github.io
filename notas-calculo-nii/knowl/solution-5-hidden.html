<div class="para">Fazendo <span class="process-math">\(u = 3x-5\text{,}\)</span> temos <span class="process-math">\(du = 3dx\)</span> ou <span class="process-math">\(dx = 1/3 du\text{.}\)</span> Portanto,</div>
<div class="displaymath process-math">
\begin{align*}
\int \frac{dx}{(3x-5)^8} =\amp~ \int \frac{1/3 du}{u^8}\\
=\amp~ \frac{1}{3} \int u^{-8} du\\
=\amp~ \frac{1}{3} \frac{u^{-7}}{-7} + c\\
=\amp~ \frac{-1}{21(3x-5)^7} + c
\end{align*}
</div>
