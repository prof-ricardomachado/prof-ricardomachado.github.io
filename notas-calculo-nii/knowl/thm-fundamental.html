<span class="type">Teorema</span><span class="space"> </span><span class="codenumber">1.6.1</span><span class="period">.</span><span class="space"> </span><span class="title">Teorema Fundamental do Cálculo.</span>
</h3>
<div class="para logical">
<div class="para">Se <span class="process-math">\(f\)</span> for uma função contínua no intervalo <span class="process-math">\([a, b]\)</span> e <span class="process-math">\(F\)</span> for uma primitiva de <span class="process-math">\(f\)</span> em <span class="process-math">\([a, b]\text{,}\)</span> então:</div>
<div class="displaymath process-math">
\begin{equation*}
\int_a^b f(t) \, dt = F(b) - F(a)
\end{equation*}
</div>
