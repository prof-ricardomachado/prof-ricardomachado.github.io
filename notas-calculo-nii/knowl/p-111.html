<div class="para">Na prática, fazemos as substituições:</div>
<ul class="disc">
<li><div class="para"><span class="process-math">\(\displaystyle u = f(x) \Rightarrow du = f'(x)dx\)</span></div></li>
<li><div class="para"><span class="process-math">\(\displaystyle v = g(x) \Rightarrow dv = g'(x)dx\)</span></div></li>
</ul>
<div class="para">Substituindo em <a href="" class="xref" data-knowl="./knowl/eq-partes-1.html" title="Equação 1.3.1">(1.3.1)</a>, obtemos a fórmula usual:</div>
<div class="displaymath process-math" data-contains-math-knowls="./knowl/eq-partes-1.html">
\begin{equation*}
\int u \, dv = uv - \int v \, du\text{.}
\end{equation*}
