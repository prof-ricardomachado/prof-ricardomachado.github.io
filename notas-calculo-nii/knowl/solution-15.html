<div class="para logical">
<div class="para">Uma primitiva de <span class="process-math">\(f(x) = \cos x\)</span> é <span class="process-math">\(G(x) = \operatorname{sen} x\text{.}\)</span> Temos:</div>
<div class="displaymath process-math">
\begin{equation*}
\int_0^{\pi} \cos x \, dx = \left. \operatorname{sen} x \right|_0^{\pi} = \operatorname{sen} \pi - \operatorname{sen} 0 = 0\text{.}
\end{equation*}
