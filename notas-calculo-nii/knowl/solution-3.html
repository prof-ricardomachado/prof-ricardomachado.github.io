<div class="para">Fazendo <span class="process-math">\(u = x+7\text{,}\)</span> temos <span class="process-math">\(du = dx\text{.}\)</span> Então,</div>
<div class="displaymath process-math">
\begin{equation*}
\int \operatorname{sen}(x+7) dx = \int \operatorname{sen} u du = -\cos u + c = -\cos(x+7) + c\text{.}
\end{equation*}
