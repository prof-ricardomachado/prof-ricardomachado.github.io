<h5 class="heading"><span class="type">Parágrafo</span></h5>
<div class="para">Solução: O argumento do logaritmo natural deve ser maior que zero: <span class="process-math">\(y - x^2 &gt; 0 \implies y &gt; x^2\text{.}\)</span> Geometricamente, o domínio é a região estritamente "dentro" (acima) da parábola <span class="process-math">\(y = x^2\text{.}\)</span> A fronteira (a própria parábola) não faz parte do domínio.</div>
