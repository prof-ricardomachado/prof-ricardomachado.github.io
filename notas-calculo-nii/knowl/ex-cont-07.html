<div class="para logical">
<div class="para">A função a seguir modela uma placa com duas temperaturas diferentes. Existe quebra de continuidade na fronteira <span class="process-math">\(y = x\text{?}\)</span>
</div>
<div class="displaymath process-math">
\begin{equation*}
T(x,y) = 
\begin{cases} 
x^2, \amp \text{se } y \ge x \\ 
2x - 1, \amp \text{se } y \lt x 
\end{cases}
\end{equation*}
</div>
