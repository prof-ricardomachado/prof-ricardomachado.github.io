<div class="para">Podemos reescrever essa expressão usando o vetor gradiente:</div>
<div class="displaymath process-math">
\begin{equation*}
\frac{dh}{dt} = \nabla f(\vec{g}(t)) \cdot \vec{g}'(t),
\end{equation*}

<div class="para">na qual <span class="process-math">\(\vec{g}(t) = (x(t), y(t))\)</span> e, consequentemente, <span class="process-math">\(\vec{g}'(t) = (x'(t), y'(t))\text{.}\)</span>
</div>
