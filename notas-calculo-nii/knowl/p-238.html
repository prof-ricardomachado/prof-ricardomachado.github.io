<div class="para">Sejam <span class="process-math">\(f(x)\)</span> e <span class="process-math">\(g(x)\)</span> funções contínuas em <span class="process-math">\([a, b]\)</span> tais que <span class="process-math">\(f(x) \ge g(x)\text{.}\)</span> A área da região limitada pelos gráficos de <span class="process-math">\(f\)</span> e <span class="process-math">\(g\)</span> e pelas retas <span class="process-math">\(x = a\)</span> e <span class="process-math">\(x = b\)</span> é:</div>
<div class="displaymath process-math">
\begin{equation*}
A = \int_{a}^{b} [f(x) - g(x)] \, dx
\end{equation*}
