<div class="para">O centroide depende do momento da área dividido pela área total (<span class="process-math">\(A = 1/3\)</span>):</div>
<div class="displaymath process-math">
\begin{equation*}
\bar{x} = \frac{1}{A} \int_{0}^{1} x \cdot f(x) \, dx = 3 \int_{0}^{1} x^3 \, dx = 3 \left. \left[ \frac{x^4}{4} \right] \right|_0^1 = 0,75\text{.}
\end{equation*}
