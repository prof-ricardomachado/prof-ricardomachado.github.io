\lim_{s \to 0^+} \int_{s}^{1} x^{-1/2} \, dx = \lim_{s \to 0^+} \left[ 2\sqrt{x} \right]_{s}^1
\end{equation*}

= \lim_{s \to 0^+} (2\sqrt{1} - 2\sqrt{s}) = 2 - 0 = 2
\end{equation*}
