<body class="ignore-math"><div class="solution solution-like">
<div class="para">A carga total é a integral da corrente de zero ao infinito:</div>
<div class="displaymath process-math">
\begin{equation*}
Q = \int_{0}^{\infty} I_0 e^{-t/\tau} \, dt
\end{equation*}
</div>
<div class="para">Resolvendo a integral, obtemos:</div>
<div class="displaymath process-math">
\begin{align*}
Q \amp = I_0 \left[ -\tau e^{-t/\tau} \right]_0^\infty \\
\amp = I_0 (0 - (-\tau)) \\
\amp = I_0 \tau 
\end{align*}
</div>
