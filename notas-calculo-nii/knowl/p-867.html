<h4 class="heading"><span class="type">Parágrafo</span></h4>
<div class="para logical">
<div class="para">Lembrando que o gradiente de <span class="process-math">\(f(x,y)\text{,}\)</span> denotado por <span class="process-math">\(\nabla f\text{,}\)</span> é o vetor formado pelas derivadas parciais da função:</div>
<div class="displaymath process-math">
\begin{equation*}
\nabla f(x,y) = \left( \frac{\partial f}{\partial x}, \frac{\partial f}{\partial y} \right)
\end{equation*}
</div>
