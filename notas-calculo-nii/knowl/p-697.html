<h5 class="heading"><span class="type">Parágrafo</span></h5>
<div class="para logical">
<div class="para">A diferencial de <span class="process-math">\(f\)</span> em <span class="process-math">\((x,y)\text{,}\)</span> relativa aos acréscimos <span class="process-math">\(dx\)</span> e <span class="process-math">\(dy\text{,}\)</span> é denotada por <span class="process-math">\(dz\)</span> (ou <span class="process-math">\(df\)</span>) e é definida por:</div>
<div class="displaymath process-math">
\begin{equation*}
dz = \frac{\partial f}{\partial x}(x,y) dx + \frac{\partial f}{\partial y}(x,y) dy\text{.}
\end{equation*}
</div>
